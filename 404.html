<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>404 頁面未找到 | HENGSHENG MARBLE S&T</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Noto Sans TC',sans-serif;background:#faf8f5;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
    .wrap{max-width:500px}
    h1{font-family:'Playfair Display',serif;font-size:clamp(4rem,8vw,7rem);color:#C4A882;margin-bottom:16px;line-height:1}
    h2{font-size:1.25rem;color:#1a1a1a;margin-bottom:12px;font-weight:600}
    p{color:#666;margin-bottom:32px;line-height:1.7;font-size:0.95rem}
    a{display:inline-block;padding:12px 32px;background:#C4A882;color:#fff;text-decoration:none;border-radius:6px;font-weight:500;transition:all .3s ease}
    a:hover{background:#1a1a1a}
    .sub{display:block;margin-top:24px;font-size:0.82rem;color:#999}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>抱歉，此頁面不存在</h2>
    <p>您訪問的頁面可能已被移除、名稱已變更或暫時無法使用。<br>請檢查網址是否正確，或返回首頁繼續瀏覽。</p>
    <a href="/">返回首頁</a>
    <span class="sub">HENGSHENG MARBLE S&T CO. LIMITED</span>
  </div>

<!-- Back to Top -->
<a href="#" class="back-to-top" id="backToTop" title="返回頂部 / Back to Top" aria-label="Back to top">↑</a>
<style>
.back-to-top{position:fixed;bottom:90px;right:24px;width:44px;height:44px;background:rgba(26,26,46,0.9);color:#C9A84C;border:1px solid rgba(201,168,76,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:998;opacity:0;visibility:hidden;transition:all 0.3s ease;text-decoration:none;}
.back-to-top.visible{opacity:1;visibility:visible;}
.back-to-top:hover{background:#C9A84C;color:#111;transform:translateY(-3px);}
@media(max-width:768px){.back-to-top{bottom:80px;right:16px;width:38px;height:38px;font-size:18px;}}

<style>
.breadcrumb{padding:12px 0;font-size:13px;}
.breadcrumb ol{list-style:none;display:flex;align-items:center;gap:8px;margin:0;padding:0;flex-wrap:wrap;}
.breadcrumb li{color:#888;}
.breadcrumb li:not(:last-child)::after{content:'/';margin-left:8px;color:#ccc;}
.breadcrumb a{color:#555;text-decoration:none;transition:color 0.2s;}
.breadcrumb a:hover{color:#C9A84C;}
@media(max-width:768px){.breadcrumb{font-size:11px;}}
</style>

</style>
<script>
(function(){
  var btn=document.getElementById('backToTop');
  if(!btn)return;
  window.addEventListener('scroll',function(){
    if(window.scrollY>400){btn.classList.add('visible');}else{btn.classList.remove('visible');}
  });
  btn.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
})();
</script>

</body>
</html>
